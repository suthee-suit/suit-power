<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SUIT POWER | รายละเอียดสินค้า</title>
<link rel="stylesheet" href="assets/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo">SUIT POWER</div>
    <nav>
        <a href="index.html">หน้าแรก</a>
        <a href="shop.html">สินค้า</a>
        <a href="about.html">เกี่ยวกับเรา</a>
        <a href="contact.html">ติดต่อ</a>
        <a href="cart.html">ตะกร้า</a>
    </nav>
</header>

<section class="product-detail-page">
    <div class="product-container">

        <!-- ฝั่งรูป -->
        <div class="product-image">
           <img id="productImage" src="" alt="">
        </div>

        <!-- ฝั่งข้อมูล -->
        <div class="product-info">
            <h2 id="productName"></h2>
            <p class="price" id="productPrice"></p>
            <p id="productDesc"></p>

            <label>เลือกไซส์:</label>
            <select id="sizeSelect">
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>

            <label>จำนวน:</label>
            <input type="number" id="quantity" value="1" min="1">

            <div class="button-group">
                <button onclick="addToCart()" class="btn-cart">เพิ่มลงตะกร้า</button>
                <button onclick="buyNow()" class="btn-buy">ซื้อเลย</button>
            </div>
        </div>

    </div>
</section>

<footer class="footer">
    <div class="footer-bottom">
        © 2026 SUIT POWER. All rights reserved. 
        <span class="edu-note">*ใช้เพื่อการศึกษาเท่านั้น*</span>
    </div>
</footer>

<script src="assets/js/script.js"></script>
</body>
</html>
